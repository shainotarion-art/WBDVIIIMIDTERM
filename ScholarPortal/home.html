<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - Scholar Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">📘 Scholar Portal</div>
  <nav>
    <a href="home.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="#">Profile</a>
    <a href="#">Transcript</a>
  </nav>
</header>

<section class="dashboard">

  <h2 class="title">Academic Flow</h2>

  <div class="grid">

    <div class="floating-module">
      <h3>📚 Course Catalog</h3>
      <p>Explore available subjects</p>
      <a href="courses.html"><button>View</button></a>
    </div>

    <div class="floating-module">
      <h3>🗂 Add to Semester</h3>
      <p>Build your schedule</p>
      <button>Select</button>
    </div>

    <div class="floating-module">
      <h3>💳 Pay Fees</h3>
      <p>Manage tuition payments</p>
      <button>Pay</button>
    </div>

    <div class="floating-module highlight">
      <h3>📄 Transcript</h3>
      <p>View academic record</p>
      <button>Open</button>
    </div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
